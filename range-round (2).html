function getZone(club,rem,en,cy){

  var lo=null,hi=null;
  for(var i=0;i<sorted.length;i++){
    if(sorted[i]<=cap)lo=sorted[i];
    if(sorted[i]>=cap&&hi===null)hi=sorted[i];

  if(lo===null)lo=sorted[0];
  if(hi===null)hi=sorted[sorted.length-1];

  if(lo===hi)return{lo:lo,hi:hi,mid:lo,single:true};

}

function calcAdv(zone,rem,res){

  if(res==="hit"||res==="miss_left"||res==="miss_right")return Math.min(mk,rem);
